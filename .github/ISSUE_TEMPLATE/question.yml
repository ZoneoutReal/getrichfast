name: 💬 Question or feature request
description: Ask anything, or tell us what the product should do next
labels: ["question"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - SnipKey (text expander)
        - SnipShot (screenshot & annotate)
        - MockFill (test data form filler)
        - CopyMark (copy as Markdown)
        - JSONPeek (JSON viewer & formatter)
        - FocusFence (site blocker & focus)
        - PagePulse (auto refresh & monitor)
        - Other / general
    validations:
      required: true
  - type: textarea
    id: q
    attributes:
      label: Your question or idea
    validations:
      required: true
